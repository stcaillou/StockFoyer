version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"
    networks:
      - app_network

  node_app:
    build: .
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: npx nodemon server.js
    depends_on:
      - mysql
    networks:
      - app_network

  r_script:
    build:
      context: .
      dockerfile: Dockerfile.r
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    command: Rscript Visu.R
    depends_on:
      - mysql
    ports:
      - "5137:5137"
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
